name: Render Reel Video

on:
  workflow_dispatch:

# REQUIRED: This gives the script permission to create and delete releases
permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Increased slightly because 'veryslow' render takes time

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ensure ffmpeg is available
        run: |
          if ! command -v ffmpeg &> /dev/null; then
            sudo apt update && sudo apt install -y ffmpeg
          else
            echo "ffmpeg is already installed: $(ffmpeg -version | head -n 1)"
          fi

      - name: Prepare paths
        run: mkdir -p output

      - name: Run script
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          # Pass these so you don't have to hardcode them in script.sh
          GITHUB_REPOSITORY: ${{ github.repository }} 
        run: |
          chmod +x script.sh
          ./script.sh

      # You can keep this as a backup if you want, 
      # but the Release link in your webhook is what you'll actually use.
      - name: Upload output (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: final-video-${{ github.run_id }}
          path: output/
          retention-days: 1
