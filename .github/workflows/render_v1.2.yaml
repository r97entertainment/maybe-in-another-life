name: Render Reel Video

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 5 # Safety net for long renders

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ensure ffmpeg is available
        run: |
          if ! command -v ffmpeg &> /dev/null; then
            sudo apt update && sudo apt install -y ffmpeg
          else
            echo "ffmpeg is already installed: $(ffmpeg -version | head -n 1)"
          fi

      - name: Prepare paths
        run: mkdir -p output tmp

      - name: Run script
        run: |
          chmod +x script.sh
          ./script.sh

      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: final-video-${{ github.run_id }} # Unique name per run
          path: output/
          retention-days: 1
