name: Render Reel Video -Make.com

on:
  workflow_dispatch:
  push:
  schedule:
    - cron: '0 9 * * *'
      timezone: 'Asia/Kolkata'
    - cron: '0 10 * * *'
      timezone: 'Asia/Kolkata'
    - cron: '0 11 * * *'
      timezone: 'Asia/Kolkata'
    - cron: '0 12 * * *'
      timezone: 'Asia/Kolkata'
    - cron: '0 13 * * *'
      timezone: 'Asia/Kolkata'
    - cron: '0 14 * * *'
      timezone: 'Asia/Kolkata'


permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    # --- TIME LIMIT ADDED HERE ---
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Run Everything
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          SHEETDB_URL: ${{ secrets.SHEETDB_URL }}
        run: |
          chmod +x make.sh
          ./make.sh
