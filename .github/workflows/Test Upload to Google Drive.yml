name: Upload to Google Drive

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Setup service account JSON
        run: |
          mkdir -p ~/.config/rclone
          printf '%b' "${{ secrets.GDRIVE_SERVICE_ACCOUNT }}" > ~/service_account.json

      - name: Configure rclone for Google Drive
        run: |
          rclone config create gdrive drive scope drive.file service_account_file ~/service_account.json

      - name: Upload spotify.png to Drive
        run: |
          rclone copy spotify.png gdrive:1EVIHk24_3C7DsCLcYoQOdrM_T11UrkWH/ -P
